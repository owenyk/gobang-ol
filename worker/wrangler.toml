name = "gobang-room-worker"
main = "index.js"
compatibility_date = "2024-01-01"

# Durable Object binding + migration。
# Pages 项目通过 wrangler.toml 的 [[durable_objects.bindings]] script_name 引用这个 Worker。
[[durable_objects.bindings]]
name = "GOBANG_ROOM"
class_name = "GobangRoom"

# 首次部署时需要这个 migration 创建 DO class。
# Free plan 强制用 new_sqlite_classes（DO 用 SQLite 存储），不能用老的 new_classes。
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GobangRoom"]
