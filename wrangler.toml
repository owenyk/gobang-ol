name = "gobang-ol"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./public"

# Durable Object binding：Pages build 时 wrangler 自动识别
# functions/ 里 export 的 GobangRoom class，注册到 env.GOBANG_ROOM binding。
# 注意：Pages wrangler.toml 不支持 [[migrations]] 字段（那是 wrangler deploy 用的），
# Pages build 阶段自动管理 DO namespace 首次创建。
[[durable_objects.bindings]]
name = "GOBANG_ROOM"
class_name = "GobangRoom"
