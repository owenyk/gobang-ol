name = "gobang-ol"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./public"

# ⚠️ Durable Object binding 不要写在 toml 里。
# 原因：Pages build 阶段会调 Cloudflare API 校验这个 binding；
#       如果 Worker（gobang-ol）还没建好 DO namespace，会报 [code: 10097]，
#       导致 build 失败、部署回滚到旧版本。
# 正确做法：到 Pages Dashboard → Settings → Functions → Durable Object bindings
#   Variable name : GOBANG_ROOM
#   Class name    : GobangRoom
#   Script        : gobang-ol
# 配置前先确认 Worker 项目 gobang-ol 已部署成功（Dashboard → Workers → gobang-ol
# → 最新 deployment 状态 = Success，DO 标签下能看到 GobangRoom class）。
