name = "gobang-ol"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./public"

# Durable Object binding：Pages 通过 script_name 引用外部 Worker 项目
# `gobang-room-worker` 持有的 GobangRoom class。
# Pages 本身不持有 DO class，所以这里不能配 [[migrations]] 段
# （migration 是 Worker 项目自己管理的，部署 Worker 项目时用）。
[[durable_objects.bindings]]
name = "GOBANG_ROOM"
class_name = "GobangRoom"
script_name = "gobang-ol"
